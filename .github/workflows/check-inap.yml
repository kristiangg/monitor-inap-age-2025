name: Vigilar novedades INAP

on:
  schedule:
    # Intervalo mínimo admitido por GitHub Actions. Puede haber retrasos puntuales.
    - cron: "2/5 * * * *"
  workflow_dispatch:
  inputs:
    send_test:
      description: "Enviar mensaje de prueba a Telegram"
      required: false
      default: false
      type: boolean

permissions:
  contents: write

concurrency:
  group: inap-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v5

      - name: Preparar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Comprobar página y avisar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          SEND_TEST: ${{ inputs.send_test || 'false' }}
        run: python check_inap.py

      - name: Guardar estado, historial y PDFs nuevos
        run: |
          git add state.json history.json pdfs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No hay cambios de estado que guardar."
            exit 0
          fi
          git config user.name "inap-monitor-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Actualizar estado del monitor INAP"
          git push
